<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redireccionando...</title>
</head>
<body>
  <script>
    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbwrfLwqeX7NVpUW5ip0LLaHyHpF7Tw5MZ4HHv4MKtoKcujzopHtL11nXU0nLbe6MmmNLQ/exec";
    const k = new URLSearchParams(window.location.search).get("k");

    if (k) {
      fetch(AS_URL_BASE + "?k=" + encodeURIComponent(k), { cache: "no-store" })
        .then(r => r.text())
        .then(url => {
          url = url.trim();
          if (url) {
            window.location.replace(url);
          } else {
            document.body.textContent = "No se encontró destino para este QR";
          }
        })
        .catch(() => {
          document.body.textContent = "Error al redirigir";
        });
    } else {
      document.body.textContent = 'Falta el parámetro "k"';
    }
  </script>

  Redireccionando...
</body>
</html>
